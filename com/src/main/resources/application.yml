spring:
  application:
    name: com

  datasource:
    # 기본(local) — 로컬에서 돌릴 때는 보통 localhost:5433 (Docker DB 포워딩 기준)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5433}/${SPRING_DATASOURCE_DB:ydanawa_db}}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:0910}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:60000}
      validation-timeout: ${SPRING_DATASOURCE_VALIDATION_TIMEOUT:5000}
      initialization-fail-timeout: ${SPRING_DATASOURCE_INIT_FAIL_TIMEOUT:-1}

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

app:
  api-key: ${APP_API_KEY:}
  grpc:
    host: ${APP_GRPC_HOST:localhost}
    port: ${APP_GRPC_PORT:9090}
  images:
    # 로컬 기본 경로
    directory: ${CRAWLER_OUT:c:/yjudanawa-damo/com/image-crawler}
  external:
    kakao-rest-api-key: ${KAKAO_REST_API_KEY:}
    google-api-key: ${GOOGLE_API_KEY:}
    aladin-ttb-key: ${ALADIN_TTB_KEY:}
  placeholder-image-url: ${PLACEHOLDER_IMAGE_URL:https://placehold.co/120x174?text=%EC%9D%B4%EB%AF%B8%EC%A7%80+%EC%97%86%EC%9D%8C}
  upload:
    directory: ${UPLOAD_DIR:./uploads/images}
  jwt:
    secret: ${APP_JWT_SECRET:dev-secret-key-change-me-32bytes!!}
    expiration-minutes: ${APP_JWT_EXP_MINUTES:60}

server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8

# -----------------------------
# ✅ docker 프로필 오버라이드
# -----------------------------
---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    # 컨테이너 내부에서는 localhost 금지 → 서비스명(db) + 5432
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/ydanawa_db}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:0910}

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}

app:
  grpc:
    # 컨테이너 간 통신은 서비스명으로
    host: ${APP_GRPC_HOST:library-scraper}
    port: ${APP_GRPC_PORT:9090}

  images:
    # 도커는 윈도우 경로 금지 → 리눅스 경로로
    directory: ${CRAWLER_OUT:/app/image-crawler}

  upload:
    directory: ${UPLOAD_DIR:/app/uploads/images}
